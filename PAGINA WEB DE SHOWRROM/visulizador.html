<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador de Tour 360</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #panorama { width: 100%; height: 100%; background: #000; }
        
        /* Minimapa elegante para el usuario */
        .viewer-map {
            position: absolute; bottom: 20px; left: 20px; width: 250px; height: 180px;
            background: rgba(255,255,255,0.9); border-radius: 12px; z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); overflow: hidden; border: 2px solid white;
        }
        #map-img { width: 100%; height: 100%; object-fit: contain; }
        #map-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .pin { position: absolute; width: 10px; height: 10px; background: #555; border-radius: 50%; border: 2px solid white; transform: translate(-50%,-50%); }
        .pin.active { background: #ff3b5c; box-shadow: 0 0 10px #ff3b5c; scale: 1.2; }

        /* Estilo de flechas */
        .flecha-nav { 
            width: 50px; height: 50px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; background: rgba(255,255,255,0.3); 
            border: 2px solid white; border-radius: 50%; backdrop-filter: blur(4px); transition: 0.3s;
        }
        .flecha-nav::after { content: ""; width: 14px; height: 14px; border-top: 4px solid white; border-left: 4px solid white; transform: rotate(45deg); }
        .flecha-nav:hover { background: rgba(255, 59, 92, 0.8); scale: 1.1; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="loader">
    <div>
        <h2>Cargar Tour</h2>
        <input type="file" id="config-file" accept=".json">
    </div>
</div>

<div id="panorama"></div>

<div class="viewer-map" id="map-ui" style="display:none;">
    <img id="map-img">
    <svg id="map-svg"></svg>
    <div id="pins-container"></div>
</div>

<script>
let viewer;
let tourData;

document.getElementById('config-file').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(event) {
        tourData = JSON.parse(event.target.result);
        initTour();
        document.getElementById('loader').style.display = 'none';
    };
    reader.readAsText(file);
});

function initTour() {
    const firstScene = Object.keys(tourData.scenes)[0];
    
    viewer = pannellum.viewer('panorama', {
        "default": { "firstScene": firstScene, "autoLoad": true, "sceneFadeDuration": 1000 },
        "scenes": tourData.scenes
    });

    // Cargar Mapa
    if(tourData.map) {
        document.getElementById('map-ui').style.display = 'block';
        document.getElementById('map-img').src = tourData.map;
        renderMapElements();
    }

    // Cargar Hotspots (Flechas)
    tourData.connections.forEach(conn => {
        viewer.addHotSpot({
            "pitch": conn.pitch, "yaw": conn.yaw,
            "type": "scene", "sceneId": conn.to, "cssClass": "flecha-nav"
        }, conn.from);
    });

    viewer.on('scenechange', updateMapUI);
}

function renderMapElements() {
    const svg = document.getElementById('map-svg');
    const pins = document.getElementById('pins-container');
    
    // Dibujar Líneas
    tourData.connections.forEach(conn => {
        const s1 = tourData.scenes[conn.from], s2 = tourData.scenes[conn.to];
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", s1.x+"%"); line.setAttribute("y1", s1.y+"%");
        line.setAttribute("x2", s2.x+"%"); line.setAttribute("y2", s2.y+"%");
        line.setAttribute("stroke", "rgba(0,0,0,0.2)"); line.setAttribute("stroke-width", "1.5");
        line.setAttribute("stroke-dasharray", "4");
        svg.appendChild(line);
    });

    // Dibujar Puntos
    Object.values(tourData.scenes).forEach(s => {
        const p = document.createElement('div');
        p.className = 'pin'; p.id = 'pin-' + s.id;
        p.style.left = s.x + '%'; p.style.top = s.y + '%';
        p.onclick = () => viewer.loadScene(s.id);
        pins.appendChild(p);
    });
}

function updateMapUI(sceneId) {
    document.querySelectorAll('.pin').forEach(p => p.classList.remove('active'));
    const activePin = document.getElementById('pin-' + sceneId);
    if(activePin) activePin.classList.add('active');
}
</script>
</body>
</html>
